---
layout: default
---

<section class="posts">
  fail fast, fail often
  <hr />
  <br />

  <ul>
    {% for post in site.posts %}
    <li id="post-link">
      <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      <time datetime="{{ post.date | date_to_xmlschema }}"
        >{{ post.date | date: "%Y-%m-%d" }}</time
      >
    </li>
    {% endfor %}
  </ul>
</section>
